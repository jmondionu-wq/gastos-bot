<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gastos familiares</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #f5f4f0;
    --surface:  #ffffff;
    --border:   #e2e0d8;
    --text:     #1a1a18;
    --muted:    #6b6a64;
    --accent:   #1D9E75;
    --radius:   12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #1a1a18;
      --surface: #242422;
      --border:  #383835;
      --text:    #e8e6de;
      --muted:   #9c9a92;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 13px; color: var(--muted); }

  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

  /* Filtros */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filters select, .filters input { font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); }

  /* Métricas */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .metric .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .metric .value { font-size: 22px; font-weight: 600; }
  .metric .sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Charts */
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .charts { grid-template-columns: 1fr; } }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .chart-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }

  /* Tabla */
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-card h3 { font-size: 14px; font-weight: 500; padding: 1rem; border-bottom: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500; font-size: 12px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-comida     { background:#EAF3DE; color:#3B6D11; }
  .badge-transporte { background:#E6F1FB; color:#185FA5; }
  .badge-hogar      { background:#FAEEDA; color:#854F0B; }
  .badge-salud      { background:#FBEAF0; color:#993556; }
  .badge-ocio       { background:#EEEDFE; color:#534AB7; }
  .badge-otro       { background:#F1EFE8; color:#5F5E5A; }

  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  .error   { background: #FCEBEB; color: #A32D2D; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>💰 Gastos familiares</h1>
  <span id="last-update">cargando...</span>
</header>

<div class="container">
  <div id="error-msg" class="error" style="display:none"></div>

  <div class="filters">
    <select id="filter-mes">
      <option value="">Todos los meses</option>
    </select>
    <select id="filter-cat">
      <option value="">Todas las categorías</option>
      <option value="comida">Comida</option>
      <option value="transporte">Transporte</option>
      <option value="hogar">Hogar</option>
      <option value="salud">Salud</option>
      <option value="ocio">Ocio</option>
      <option value="otro">Otro</option>
    </select>
    <select id="filter-persona">
      <option value="">Todas las personas</option>
    </select>
    <button onclick="cargarDatos()" style="padding:7px 14px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:13px;cursor:pointer;font-weight:500;">Actualizar</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="label">Total del período</div><div class="value" id="m-total">—</div><div class="sub" id="m-gastos">— gastos</div></div>
    <div class="metric"><div class="label">Mi parte</div><div class="value" id="m-mi-parte">—</div></div>
    <div class="metric"><div class="label">Promedio por gasto</div><div class="value" id="m-promedio">—</div></div>
    <div class="metric"><div class="label">Mayor gasto</div><div class="value" id="m-mayor">—</div><div class="sub" id="m-mayor-desc">—</div></div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h3>Por categoría</h3>
      <canvas id="chart-cat" height="200"></canvas>
    </div>
    <div class="chart-card">
      <h3>Por mes</h3>
      <canvas id="chart-mes" height="200"></canvas>
    </div>
  </div>

  <div class="table-card">
    <h3>Detalle de gastos</h3>
    <div id="tabla-container"><div class="loading">Cargando...</div></div>
  </div>
</div>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────────────────────────────
// Reemplaza con tus valores de Supabase
const SUPABASE_URL = "https://oomcsihzyurypogwieqc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vbWNzaWh6eXVyeXBvZ3dpZXFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODQ3MzQsImV4cCI6MjA5NDg2MDczNH0.KLIL7qkRUeE52WKICQABZsnv409snJ0xSp-bmfhBjVc";
// ─────────────────────────────────────────────────────────────────────────

let chartCat = null;
let chartMes = null;
let todosLosGastos = [];

function fmt(n) {
  return "$" + Math.round(n).toLocaleString("es-CL");
}

function badgeHtml(cat) {
  return `<span class="badge badge-${cat}">${cat.charAt(0).toUpperCase()+cat.slice(1)}</span>`;
}

async function fetchGastos() {
  let url = `${SUPABASE_URL}/rest/v1/gastos?select=*&order=fecha.desc,created_at.desc&limit=500`;
  const resp = await fetch(url, {
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    }
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
  return resp.json();
}

function filtrar(gastos) {
  const mes     = document.getElementById("filter-mes").value;
  const cat     = document.getElementById("filter-cat").value;
  const persona = document.getElementById("filter-persona").value;
  return gastos.filter(g => {
    if (mes     && !g.fecha.startsWith(mes))                    return false;
    if (cat     && g.categoria !== cat)                         return false;
    if (persona && !g.entre_quienes.includes(persona))          return false;
    return true;
  });
}

function actualizarMetricas(gastos) {
  const total    = gastos.reduce((s,g) => s + g.monto, 0);
  const miParte  = gastos.reduce((s,g) => s + g.mi_parte, 0);
  const promedio = gastos.length ? total / gastos.length : 0;
  const mayor    = gastos.reduce((m,g) => g.monto > (m?.monto||0) ? g : m, null);

  document.getElementById("m-total").textContent    = fmt(total);
  document.getElementById("m-gastos").textContent   = `${gastos.length} gastos`;
  document.getElementById("m-mi-parte").textContent = fmt(miParte);
  document.getElementById("m-promedio").textContent = fmt(promedio);
  document.getElementById("m-mayor").textContent    = mayor ? fmt(mayor.monto) : "—";
  document.getElementById("m-mayor-desc").textContent = mayor ? mayor.descripcion : "—";
}

function actualizarChartCat(gastos) {
  const cats = {};
  gastos.forEach(g => { cats[g.categoria] = (cats[g.categoria]||0) + g.monto; });
  const labels = Object.keys(cats);
  const data   = labels.map(l => cats[l]);
  const colors = {
    comida:"#639922", transporte:"#378ADD", hogar:"#EF9F27",
    salud:"#D4537E", ocio:"#7F77DD", otro:"#888780"
  };

  if (chartCat) chartCat.destroy();
  chartCat = new Chart(document.getElementById("chart-cat"), {
    type: "doughnut",
    data: { labels, datasets: [{ data, backgroundColor: labels.map(l => colors[l]||"#aaa"), borderWidth: 0 }] },
    options: { plugins: { legend: { position: "bottom", labels: { font: { size: 11 }, padding: 10 } } }, cutout: "60%" }
  });
}

function actualizarChartMes(gastos) {
  const meses = {};
  gastos.forEach(g => {
    const m = g.fecha.slice(0,7);
    meses[m] = (meses[m]||0) + g.monto;
  });
  const labels = Object.keys(meses).sort();
  const data   = labels.map(l => meses[l]);

  if (chartMes) chartMes.destroy();
  chartMes = new Chart(document.getElementById("chart-mes"), {
    type: "bar",
    data: { labels: labels.map(l => { const [y,m]=l.split("-"); return `${m}/${y.slice(2)}`; }),
            datasets: [{ data, backgroundColor: "#1D9E75", borderRadius: 6, borderSkipped: false }] },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: v => "$"+Math.round(v/1000)+"k" }, grid: { color: "rgba(0,0,0,0.05)" } },
                x: { grid: { display: false } } }
    }
  });
}

function actualizarTabla(gastos) {
  const container = document.getElementById("tabla-container");
  if (!gastos.length) {
    container.innerHTML = '<div class="loading">No hay gastos para mostrar.</div>';
    return;
  }
  const rows = gastos.map(g => {
    const personas = Array.isArray(g.entre_quienes) ? g.entre_quienes.join(", ") : g.entre_quienes;
    const fecha = g.fecha ? new Date(g.fecha+"T12:00:00").toLocaleDateString("es-CL") : "—";
    const cuota = g.cuotas > 1 ? `<span style="font-size:11px;color:var(--muted)">(${g.cuotas}c)</span>` : "";
    return `<tr>
      <td>${fecha}</td>
      <td>${g.descripcion}</td>
      <td>${badgeHtml(g.categoria)}</td>
      <td style="font-weight:500">${fmt(g.monto)} ${cuota}</td>
      <td style="color:var(--muted);font-size:12px">${personas}</td>
      <td style="font-weight:500">${fmt(g.mi_parte)}</td>
    </tr>`;
  }).join("");

  container.innerHTML = `<div style="overflow-x:auto"><table>
    <thead><tr>
      <th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Monto</th><th>Entre quiénes</th><th>Mi parte</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function poblarFiltros(gastos) {
  // Meses
  const meses = [...new Set(gastos.map(g => g.fecha.slice(0,7)))].sort().reverse();
  const selMes = document.getElementById("filter-mes");
  selMes.innerHTML = '<option value="">Todos los meses</option>' +
    meses.map(m => { const [y,mo]=m.split("-"); return `<option value="${m}">${mo}/${y}</option>`; }).join("");

  // Personas
  const personas = [...new Set(gastos.flatMap(g => Array.isArray(g.entre_quienes)?g.entre_quienes:[]))];
  const selP = document.getElementById("filter-persona");
  selP.innerHTML = '<option value="">Todas las personas</option>' +
    personas.map(p => `<option value="${p}">${p}</option>`).join("");
}

async function cargarDatos() {
  try {
    document.getElementById("error-msg").style.display = "none";
    if (!todosLosGastos.length) {
      document.getElementById("tabla-container").innerHTML = '<div class="loading">Cargando...</div>';
    }
    todosLosGastos = await fetchGastos();
    poblarFiltros(todosLosGastos);
    renderizar();
    document.getElementById("last-update").textContent =
      "actualizado " + new Date().toLocaleTimeString("es-CL");
  } catch(e) {
    console.error(e);
    const msg = document.getElementById("error-msg");
    msg.style.display = "block";
    msg.textContent = "⚠️ Error al cargar datos. Revisa las credenciales de Supabase. " + e.message;
  }
}

function renderizar() {
  const gastos = filtrar(todosLosGastos);
  actualizarMetricas(gastos);
  actualizarChartCat(gastos);
  actualizarChartMes(todosLosGastos); // el gráfico de meses siempre muestra todo
  actualizarTabla(gastos);
}

// Eventos de filtros
["filter-mes","filter-cat","filter-persona"].forEach(id => {
  document.getElementById(id).addEventListener("change", renderizar);
});

// Carga inicial y auto-refresh cada 30s
cargarDatos();
setInterval(cargarDatos, 30000);
</script>
</body>
</html>
